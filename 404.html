<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found — LSTE</title>
  <link rel="icon" href="./assets/img/lste-logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="./assets/css/styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-ink);
      text-align: center;
      padding: 2rem;
    }
    .error-page__inner { max-width: 560px; }
    .error-code {
      font-family: var(--font-heading);
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      line-height: 1;
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .error-page h1 { color: #fff; font-size: clamp(1.5rem, 4vw, 2rem); margin-bottom: 1rem; }
    .error-page p { color: rgba(255,255,255,.7); margin-bottom: 2rem; line-height: 1.7; }
    .error-links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .error-nav { margin-top: 3rem; }
    .error-nav ul { list-style: none; padding: 0; display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    .error-nav a { color: rgba(255,255,255,.6); font-size: .9rem; text-decoration: none; transition: color .2s; }
    .error-nav a:hover { color: var(--color-primary); }
  </style>
</head>
<body>

  <div class="error-page">
    <div class="error-page__inner">
      <div class="error-code" aria-hidden="true">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track for LSTE 2026 — 26 November, Esch-Belval.</p>
      <div class="error-links">
        <a href="./index.html" class="btn btn--primary"><i class="fa-solid fa-house" aria-hidden="true"></i> Go to homepage</a>
        <a href="./contact/index.html" class="btn btn--outline" style="color:#fff;border-color:rgba(255,255,255,.4);">Contact us</a>
      </div>
      <nav class="error-nav" aria-label="Quick links">
        <ul>
          <li><a href="./about/index.html">About</a></li>
          <li><a href="./schedule/index.html">Programme</a></li>
          <li><a href="./speakers/index.html">Speakers</a></li>
          <li><a href="./register/index.html">Register</a></li>
          <li><a href="./gallery/index.html">Gallery</a></li>
          <li><a href="./contact/index.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </div>

  <script src="./assets/js/main.js" defer></script>
</body>
</html>
